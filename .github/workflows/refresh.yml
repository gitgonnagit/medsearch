name: refresh

on:
  # Weekly, after the government's Tuesday-morning PDDF update.
  # 18:00 UTC = 11:00 PDT / 10:00 PST, comfortably after the morning refresh.
  schedule:
    - cron: '0 18 * * 2'
  # Allow manual triggers (workflow_dispatch) for testing the full loop.
  workflow_dispatch:

# `actions/deploy-pages@v4` requires `pages: write` + `id-token: write`
# (OIDC-based Pages deployment token). `contents: read` keeps the
# checkout step narrow.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment per schedule slot — guard against overlapping runs.
concurrency:
  group: refresh-deploy
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Bind the deployment job to the `github-pages` environment so the
    # OIDC token tied to actions/deploy-pages@v4 carries the
    # environment claims the Pages backend expects. Without this binding
    # the step reports success but the Pages service silently drops the
    # payload — leaving `latest_status: null` and the URL on the GH 404
    # stub. The `url` output re-emits the published URL to GHA logs.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Note: NO `MEDSEARCH_DRUG_LIMIT` is set. We previously capped the emitter
    # at 5,000 pages to stay under an artifact size that `actions/deploy-pages@v4`
    # was rejecting with 10 GB errors. That cap silently truncated the
    # dataset around the "M" genericName-letter boundary — metformin
    # and everything alphabetically past it 404'd at `/medsearch/drug/<din>/`.
    # The full active PDDF set is ~60,741 DINs × ~5 KB HTML ≈ 300 MB — well
    # under the documented 10 GB hard cap on
    # `actions/upload-pages-artifact@v3` + `actions/deploy-pages@v4`, with
    # ~30× headroom. Re-cap if the artifact ever approaches the hard cap.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run data pipeline
        # No MEDSEARCH_AS_OF: scheduled runs have no commit context, and
        # using `head_commit.timestamp` would resolve to empty. The pipeline
        # defaults to "today" when the env var is unset, which is the
        # correct behaviour for Tuesday-morning PDDF refreshes.
        run: npm run pipeline

      - name: Validate pipeline outputs
        run: npm run pipeline:check

      # The custom HTML emitter (`pipeline/emit-static.ts`) bypasses Next.js
      # for /drug/[din]/*.html and emits ALL ~60,741 active DIN/PIN pages
      # into ./out-static/ (one self-contained `.html` per id; ≈300 MB
      # total). MEDSEARCH_DRUG_LIMIT is intentionally unset in the job env;
      # set it manually here for ad-hoc dev smoke tests if needed.
      - name: Emit drug detail pages
        env:
          # The site lives at gitgonnagit.github.io/medsearch/ — a project
          # page subpath under the owner's user site. Pin NEXT_PUBLIC_BASE_PATH
          # so Next.js's `basePath` and the emitter's emitted hrefs both end
          # up as /medsearch/_next/.../medsearch.css etc., instead of bare
          # root paths that 404 against the project subpath. The previous
          # wiring read from `${{ vars.NEXT_PUBLIC_BASE_PATH }}` (a repo-level
          # CI variable that was never set), so assets shipped without the
          # prefix and the home page rendered un-Hydrated.
          #
          # We hardcode `/medsearch` rather than deriving it from the GHA
          # expression `github.event.repository.name` because that field is
          # only populated for events with a repo payload (workflow_dispatch,
          # push); the Tuesday `schedule` cron sees an empty `github.event`
          # and would silently re-introduce the broken state. GitHub Actions
          # expressions don't support a portable string-split primitive
          # either, so a literal is the most defensive option for this
          # repo-specific workflow.
          NEXT_PUBLIC_BASE_PATH: /medsearch
        run: npm run pipeline:emit

      # `next build` with `output: 'export'` writes the search home + about
      # (including `public/data/*` copied to `out/data/`) directly into the
      # `out/` directory. The drug route is intentionally empty so Next.js
      # skips it.
      - name: Build Next.js site
        env:
          # Same as above: keep basePath in sync with the GitHub Pages
          # project-site subpath so Next's client bundle, CSS chunk URLs,
          # and image references all resolve. The literal `/medsearch`
          # matches this repo's project-site URL; see the longer comment on
          # the `Emit drug detail pages` step for why we don't try to
          # derive this dynamically (GHA expressions can't split strings
          # portably, and `github.event.repository.name` is empty on the
          # schedule cron).
          NEXT_PUBLIC_BASE_PATH: /medsearch
        # Wipe `.next` before building so Next.js's incremental-compile
        # disk cache can't be reused across runs. Empirically this matters:
        # back-to-back GHA runs on otherwise-identical VMs were producing
        # the same Webpack chunk hashes even when the source AST had
        # changed, leaving the live bundle holding bare `${base}/data/...`
        # fetch URLs that 404 against the project-site subpath. The runner
        # is meant to be ephemeral, but the rebuild guarantee is now part
        # of the workflow rather than a property of the runner. Typical
        # cost: ~3–5 min clean build (vs. ~1–2 min incremental) — cheap
        # insurance against silently stale deploys.
        run: rm -rf .next && npm run build

      # Merge the emitter's out-static/ into out/ so both producers land in
      # the same Pages artifact.
      - name: Merge static outputs
        run: npm run build:merge

      - name: Quick smoke test against the built index
        run: |
          test -f out/data/search-index.json
          test -f out/data/related.json
          test -f out/data/meta.json
          test -f out/index.html
          test -f out/medsearch.css
          ls out/drug | head -3
          du -sh out/drug out/data out/medsearch.css

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      # The repo's Pages source is set to `build_type: workflow`, which
      # disables GitHub's auto-managed `pages-build-deployment` workflow
      # and expects *this* workflow to call `actions/deploy-pages` itself.
      # The step reads the `github-pages` artifact (uploaded above) and
      # pushes the result to the live URL via OIDC + pages: write. The
      # matching `pages: write` + `id-token: write` permissions are set
      # at the workflow-level above.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact_name: github-pages

